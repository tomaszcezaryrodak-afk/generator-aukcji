services:
  - type: web
    name: generator-aukcji
    runtime: python
    plan: starter
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: FAL_AI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: BASELINKER_TOKEN
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: RATE_LIMIT_SEC
        value: "2"
      - key: PYTHON_VERSION
        value: "3.11"
